<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OwnIt Agent Portal</title>

  <link rel="stylesheet" href="assets/app.css" />
  <link rel="stylesheet" href="assets/agent-portal.css" />
</head>

<body class="agent-body">

  <div id="toastContainer" class="agent-toast-container" aria-live="polite"></div>
  <div id="leadDrawerRoot"></div>

  <div class="agent-shell" id="agentShell">
    <aside class="agent-sidebar" id="agentSidebar">
      <a class="agent-sidebar__brand" href="#/">
        <span class="brand__logo">OI</span>
        <span class="agent-sidebar__brand-text">Agent Portal</span>
      </a>

      <nav class="agent-sidebar__nav" id="agentSidebarNav">
        <a href="#/" data-nav="/" class="agent-sidebar__link">
          <span>Dashboard</span>
        </a>
        <a href="#/leads" data-nav="/leads" class="agent-sidebar__link">
          <span>Clients</span>
          <span class="agent-sidebar__badge hidden" data-badge="leads"></span>
        </a>
        <a href="#/chats" data-nav="/chats" class="agent-sidebar__link">
          <span>Inbox</span>
          <span class="agent-sidebar__badge hidden" data-badge="chats"></span>
        </a>
        <a href="#/listings" data-nav="/listings" class="agent-sidebar__link">
          <span>Listings</span>
        </a>
        <a href="#/home-values" data-nav="/home-values" class="agent-sidebar__link">
          <span>Home Values</span>
        </a>
        <a href="#/appointments" data-nav="/appointments" class="agent-sidebar__link">
          <span>Showings</span>
          <span class="agent-sidebar__badge hidden" data-badge="appointments"></span>
        </a>
        <a href="#/settings" data-nav="/settings" class="agent-sidebar__link">
          <span>Settings</span>
        </a>
      </nav>

      <div class="agent-sidebar__footer">
        <a href="/" class="agent-sidebar__link agent-sidebar__link--muted" target="_blank" rel="noopener">View customer site</a>
      </div>
    </aside>

    <div class="agent-content">
      <header class="agent-topbar">
        <button type="button" class="agent-topbar__menu" id="sidebarToggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
        <h1 class="agent-topbar__title" id="pageTitle">Dashboard</h1>
        <div class="agent-topbar__actions">
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle theme">
            <svg class="theme-toggle__sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <svg class="theme-toggle__moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <span id="userBadge" class="agent-topbar__user hidden"></span>
          <button id="logoutBtn" class="btn btn--ghost hidden" type="button">Logout</button>
        </div>
      </header>

      <main class="agent-main" id="app"></main>
    </div>
  </div>

  <div id="sidebarBackdrop" class="agent-sidebar-backdrop"></div>

  <script type="module" src="assets/agent-portal.js"></script>
</body>
</html>
